name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix, e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update cx formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download checksums from release
        run: |
          curl -fSL "https://github.com/coralogix/cx-cli/releases/download/v${{ inputs.version }}/checksums-sha256.txt" \
            -o checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract checksums
        id: meta
        run: |
          VERSION="${{ inputs.version }}"

          SHA_MACOS_X86=$(grep "cx-${VERSION}-x86_64-apple-darwin.tar.gz" checksums-sha256.txt | awk '{print $1}')
          SHA_MACOS_ARM=$(grep "cx-${VERSION}-aarch64-apple-darwin.tar.gz" checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X86=$(grep "cx-${VERSION}-x86_64-unknown-linux-musl.tar.gz" checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "cx-${VERSION}-aarch64-unknown-linux-musl.tar.gz" checksums-sha256.txt | awk '{print $1}')

          echo "sha_macos_x86=$SHA_MACOS_X86" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=$SHA_MACOS_ARM" >> "$GITHUB_OUTPUT"
          echo "sha_linux_x86=$SHA_LINUX_X86" >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm=$SHA_LINUX_ARM" >> "$GITHUB_OUTPUT"

          for var in SHA_MACOS_X86 SHA_MACOS_ARM SHA_LINUX_X86 SHA_LINUX_ARM; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing checksum for $var"
              exit 1
            fi
          done

      - name: Render formula from template
        run: |
          sed \
            -e 's/@@VERSION@@/${{ inputs.version }}/g' \
            -e 's/@@SHA256_MACOS_X86@@/${{ steps.meta.outputs.sha_macos_x86 }}/g' \
            -e 's/@@SHA256_MACOS_ARM@@/${{ steps.meta.outputs.sha_macos_arm }}/g' \
            -e 's/@@SHA256_LINUX_X86@@/${{ steps.meta.outputs.sha_linux_x86 }}/g' \
            -e 's/@@SHA256_LINUX_ARM@@/${{ steps.meta.outputs.sha_linux_arm }}/g' \
            templates/cx.rb.template > Formula/cx.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: update-cx-${{ inputs.version }}
          base: master
          commit-message: "cx ${{ inputs.version }}"
          title: "cx ${{ inputs.version }}"
          body: "Automated formula bump for cx ${{ inputs.version }}."
          sign-commits: true
          add-paths: Formula/cx.rb
          delete-branch: true
